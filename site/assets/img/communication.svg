<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="communication">
  <title>communication</title>
  <desc>An edge between two nodes. The smallest unit of exchange — a single bit.</desc>
  <line x1="14" y1="32" x2="50" y2="32" stroke="#0E0E12" stroke-width="2" stroke-linecap="round"/>
  <!-- direction tick: a small chevron midway, no arrow filigree -->
  <polyline points="30,26 36,32 30,38" fill="none" stroke="#0E0E12" stroke-width="2" stroke-linecap="round" stroke-linejoin="miter"/>
  <circle cx="10" cy="32" r="7" fill="#FF2D6F"/>
  <circle cx="54" cy="32" r="7" fill="none" stroke="#0E0E12" stroke-width="2"/>
</svg>
