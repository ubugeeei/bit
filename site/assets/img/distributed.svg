  <g stroke="#0E0E12" stroke-width="1.5" stroke-linecap="round" fill="none">
    <line x1="12" y1="14" x2="34" y2="30"/>
    <line x1="34" y1="30" x2="54" y2="18"/>
    <line x1="34" y1="30" x2="48" y2="52"/>
    <line x1="34" y1="30" x2="14" y2="48"/>
    <line x1="54" y1="18" x2="48" y2="52"/>
    <line x1="12" y1="14" x2="14" y2="48"/>
  </g>
  <circle cx="12" cy="14" r="4" fill="none" stroke="#0E0E12" stroke-width="2"/>
  <circle cx="54" cy="18" r="4" fill="#0E0E12"/>
  <circle cx="48" cy="52" r="4" fill="none" stroke="#0E0E12" stroke-width="2"/>
  <circle cx="14" cy="48" r="4" fill="#0E0E12"/>
  <circle cx="34" cy="30" r="7" fill="#FF2D6F"/>
