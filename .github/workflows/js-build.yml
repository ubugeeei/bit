name: JS Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  js-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pkfire
        uses: mizchi/pkfire@v0
      - name: Install pkspec
        uses: mizchi/pkspec@v0.2.1
        with:
          pkl-version: none

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Moon update
        run: moon update

      - name: Guard compat allowlist
        run: pkspec exec -f Test.pkl --only git-compat-allowlist

      - name: Run JS build tests
        run: pkf run test-js-build
