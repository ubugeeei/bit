name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon update
        run: moon update
      - name: just check
        run: just check
      - name: just test
        run: just test

  distributed-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon update
        run: moon update
      - name: Distributed tests
        run: |
          moon test --target native -p mizchi/bit/x/agent
          moon test --target native -p mizchi/bit/x/agent/llm
          moon test --target native -p mizchi/bit/x/agent/mcp
          moon test --target native -p mizchi/bit/x/agent/native
          moon test --target native -p mizchi/bit/x/hub
          moon test --target native -p mizchi/bit/x/hub/native
          moon test --target native -p mizchi/bit/x/kv

  git-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Apply git test patches
        run: tools/apply-git-test-patches.sh

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext libcurl4-openssl-dev libexpat1-dev

      - name: Build git from source
        run: |
          cd third_party/git
          make -j$(nproc)

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Moon update
        run: moon update

      - name: Build bit
        run: |
          set -euo pipefail
          moon build --target native
          bin_path=""
          for candidate in \
            "_build/native/release/build/cmd/bit/bit.exe" \
            "_build/native/debug/build/cmd/bit/bit.exe"; do
            if [ -f "$candidate" ]; then
              bin_path="$candidate"
              break
            fi
          done
          if [ -z "$bin_path" ]; then
            echo "bit binary not found in _build/native/*/build/cmd/bit/bit.exe"
            find _build/native -maxdepth 8 -type f -name 'bit.exe' || true
            exit 1
          fi
          echo "Using bit binary: $bin_path"
          cp "$bin_path" tools/git-shim/moon
          chmod +x tools/git-shim/moon

      - name: Run git compatibility tests
        run: |
          real_git="$(pwd)/third_party/git/git"
          exec_path="$(pwd)/third_party/git"
          shim_dir="$(pwd)/tools/git-shim/bin"
          echo "$real_git" > tools/git-shim/real-git-path

          tests=$(tools/select-git-tests.sh "${{ matrix.shard }}" 5 tools/git-test-allowlist.txt)
          echo "Shard ${{ matrix.shard }}: $(echo "$tests" | wc -w | tr -d ' ') tests"

          export SHIM_REAL_GIT="$real_git" SHIM_EXEC_PATH="$exec_path" \
          SHIM_MOON="$(pwd)/tools/git-shim/moon" \
          SHIM_CMDS="init status add commit log show branch checkout switch reset rebase stash cherry-pick diff diff-files diff-index merge tag rm mv config sparse-checkout rev-parse cat-file ls-files hash-object ls-tree write-tree show-ref update-ref symbolic-ref reflog worktree gc clean grep submodule revert notes bisect describe blame format-patch shortlog remote clone fetch pull push receive-pack upload-pack pack-objects index-pack shell pack-redundant" SHIM_STRICT=1 \
          GIT_TEST_INSTALLED="$shim_dir" GIT_TEST_EXEC_PATH="$exec_path" \
          GIT_TEST_DEFAULT_HASH=sha1

          failed_tests=""
          passed=0
          failed=0
          for t in $tests; do
            if make -C third_party/git test T="$t" 2>&1 | tail -5; then
              passed=$((passed + 1))
            else
              failed=$((failed + 1))
              failed_tests="$failed_tests $t"
            fi
          done
          echo "=== Summary ==="
          echo "Passed: $passed, Failed: $failed"
          if [ -n "$failed_tests" ]; then
            echo "Failed tests:$failed_tests"
            exit 1
          fi

      - name: Generate compat table
        if: always()
        run: |
          bash tools/generate-compat-table.sh > "compat-results-shard-${{ matrix.shard }}.md"
          cat "compat-results-shard-${{ matrix.shard }}.md"

      - name: Upload compat results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compat-results-shard-${{ matrix.shard }}
          path: compat-results-shard-${{ matrix.shard }}.md
