name: Pages Demo

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages-demo.yml"
      - "docs/demo/**"
      - "justfile"
      - "moon.mod.json"
      - "src/lib/**"
      - "tools/bit-git.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-demo
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Moon update
        run: moon update

      - name: Rebuild checked-in demo bundle
        run: just build-docs-demo

      - name: Verify checked-in bundle is up to date
        run: git diff --exit-code -- docs/demo/app.js
