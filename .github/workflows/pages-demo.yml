name: Pages Demo

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages-demo.yml"
      - "docs/demo/**"
      - "docs/playground/**"
      - "playground/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.playground.config.mjs"
      - "Taskfile.pkl"
      - "Test.pkl"
      - "pkspec/**"
      - "moon.mod.json"
      - "src/lib/**"
      - "tools/bit-git.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-demo
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install pkfire
        uses: mizchi/pkfire@v0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Moon update
        run: moon update

      - name: Install playground dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Pages demo artifact
        run: |
          # The checked-in docs bundles are not byte-stable across host platforms,
          # so CI only verifies that the Pages artifact can be rebuilt.
          pkf run build-pages-demo
          test -s target/pages/app.js
          test -s target/pages/playground/app.js
