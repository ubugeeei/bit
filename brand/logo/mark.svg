<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="bit logomark">
  <title>bit logomark</title>
  <desc>A triad of nodes — one pink source, two ink peers — connected by edges. Distributed communication.</desc>
  <!-- edges drawn first so node fills sit on top -->
  <g stroke="#0E0E12" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="66" y1="76"  x2="146" y2="64"/>
    <line x1="66" y1="76"  x2="110" y2="152"/>
    <line x1="146" y1="64" x2="110" y2="152"/>
  </g>
  <!-- peer A: ink outline -->
  <circle cx="146" cy="64" r="20" fill="none" stroke="#0E0E12" stroke-width="5"/>
  <!-- peer B: ink solid -->
  <circle cx="110" cy="152" r="12" fill="#0E0E12"/>
  <!-- source: pink solid -->
  <circle cx="66" cy="76" r="32" fill="#FF2D6F"/>
</svg>
